const DATEMAP=DATA.datemap;
const cart={};               // name -> qty
const HEADER=60;
let lockSpy=false;

// 茶市判斷（香港時間）
function nowHK(){ return new Date(new Date().toLocaleString('en-US',{timeZone:'Asia/Hong_Kong'})); }
function isTeaTime(){
  const n=nowHK();
  const key=n.getDate()+"/"+(n.getMonth()+1)+"/"+n.getFullYear();
  if(DATEMAP[key]!=="平日") return false;
  const m=n.getHours()*60+n.getMinutes();
  return (m>=8*60 && m<=10*60+30) || (m>=14*60 && m<=17*60);
}
const TEA=isTeaTime();
function unitPrice(it){ return (TEA && it.tea!=null) ? it.tea : it.normal; }

const catsEl=document.getElementById('cats');
const itemsEl=document.getElementById('items');
const countEl=document.getElementById('count');
const sendBtn=document.getElementById('sendbtn');
const toastEl=document.getElementById('toast');

if(TEA){ document.body.classList.add('tea'); document.getElementById('teabar').classList.add('show'); }

// 左側分類
DATA.cats.forEach((c,i)=>{
  const d=document.createElement('div');
  d.className='cat'+(i===0?' active':'');
  d.textContent=c;
  d.onclick=()=>{ const s=document.getElementById('sec-'+i);
    const y=s.getBoundingClientRect().top+window.pageYOffset-HEADER-(TEA?32:0);
    lockSpy=true; setActive(i); window.scrollTo({top:y,behavior:'smooth'}); };
  catsEl.appendChild(d);
});

// 右側點心
DATA.cats.forEach((c,i)=>{
  const h=document.createElement('div'); h.className='sec-h'; h.id='sec-'+i; h.textContent=c;
  itemsEl.appendChild(h);
  DATA.menu.filter(m=>m.cat===c).forEach(m=>{
    const up=unitPrice(m);
    const wasTea = TEA && m.tea!=null && m.tea<m.normal;
    const card=document.createElement('div'); card.className='card';
    card.innerHTML=
      '<img loading="lazy" src="'+m.img+'" alt="">'+
      '<div class="info"><div class="nm">'+m.name+'</div></div>'+
      '<div class="stp"><button class="minus" aria-label="減">−</button>'+
      '<span class="qty zero">0</span><button class="plus" aria-label="加">+</button></div>';
    const minus=card.querySelector('.minus'), plus=card.querySelector('.plus'), qty=card.querySelector('.qty');
    function render(){
      const n=cart[m.name]||0;
      qty.textContent=n; qty.classList.toggle('zero',n===0);
      minus.style.visibility=n>0?'visible':'hidden';
      card.classList.toggle('on',n>0); updateCart();
    }
    plus.onclick=()=>{ const n=cart[m.name]||0;
      if(n>=10){ toast("每款最多 10 件"); return; }
      cart[m.name]=n+1; render(); };
    minus.onclick=()=>{ cart[m.name]=Math.max(0,(cart[m.name]||0)-1);
      if(!cart[m.name]) delete cart[m.name]; render(); };
    itemsEl.appendChild(card);
  });
});

// scroll-spy
const secs=DATA.cats.map((c,i)=>document.getElementById('sec-'+i));
function setActive(idx){ [...catsEl.children].forEach((el,i)=>el.classList.toggle('active',i===idx)); }
function onScroll(){
  if(lockSpy) return;
  if(window.innerHeight+window.pageYOffset>=document.body.scrollHeight-2){ setActive(secs.length-1); return; }
  let a=0; const off=HEADER+(TEA?32:0)+6;
  secs.forEach((s,i)=>{ if(s.getBoundingClientRect().top-off<=0) a=i; });
  setActive(a);
}
window.addEventListener('scroll',onScroll,{passive:true});
['wheel','touchmove'].forEach(ev=>window.addEventListener(ev,()=>{lockSpy=false;},{passive:true}));

function cartList(){  // [{name,qty,unit,line}]
  const out=[];
  DATA.cats.forEach(c=>DATA.menu.filter(m=>m.cat===c && cart[m.name]>0)
    .forEach(m=>out.push({cat:c,name:m.name,qty:cart[m.name],unit:unitPrice(m),line:cart[m.name]*unitPrice(m)})));
  return out;
}
function updateCart(){
  let tot=0;
  for(const it of cartList()){ tot+=it.qty; }
  countEl.textContent=tot;
  sendBtn.disabled=tot===0;
}
function toast(t){ toastEl.textContent=t; toastEl.classList.add('show');
  setTimeout(()=>toastEl.classList.remove('show'),1700); }

// 預覽 modal
const mask=document.getElementById('mask'), pvbody=document.getElementById('pvbody');
function openPreview(){
  const list=cartList(); if(!list.length){ toast("請先選擇點心"); return; }
  let tot=0,price=0,html="",lastCat="";
  list.forEach(it=>{
    if(it.cat!==lastCat){ html+='<div class="pvcat">'+it.cat+'</div>'; lastCat=it.cat; }
    html+='<div class="pvrow"><span class="pn">'+it.name+'</span><span class="q">×'+it.qty+'</span><span class="lp">$'+it.line+'</span></div>';
    tot+=it.qty; price+=it.line;
  });
  html+='<div class="pvtotal"><span>合計 '+tot+' 件</span><span>約 $'+price+'</span></div>';
  html+='<div class="notes">'+
    '• 下單後將會收到確認，如 <b>5 分鐘內未收到</b>，請致電餐廳 '+TEL.replace(/(\d{4})(\d{4})/,'$1 $2')+'。<br>'+
    '• 價錢只為參考，<b>確實價錢以餐廳計算為準</b>。<br>'+
    '• 下單確認後 <b>20 至 25 分鐘</b>可取餐。'+
    (TEA?'<br>• 現為茶市時段，已套用特價。':'')+'</div>';
  pvbody.innerHTML=html; mask.classList.add('show');
}
document.getElementById('btnBack').onclick=()=>mask.classList.remove('show');
mask.onclick=(e)=>{ if(e.target===mask) mask.classList.remove('show'); };
sendBtn.onclick=openPreview;

function buildMsg(){
  const list=cartList(); let tot=0,price=0;
  let lines=["🥟 豪隍點心工房（將軍澳）外賣訂單","━━━━━━━━━━"];
  let lastCat="";
  list.forEach(it=>{
    if(it.cat!==lastCat){ lines.push("【"+it.cat+"】"); lastCat=it.cat; }
    lines.push("・"+it.name+" ×"+it.qty+"　$"+it.line);
    tot+=it.qty; price+=it.line;
  });
  lines.push("━━━━━━━━━━","合計 "+tot+" 件　約 $"+price);
  if(TEA) lines.push("（茶市特價時段）");
  lines.push("（價錢只供參考，確實以餐廳為準）");
  return lines.join("\n");
}
document.getElementById('btnGo').onclick=()=>{
  window.location.href="https://wa.me/"+WA+"?text="+encodeURIComponent(buildMsg());
};
</script>

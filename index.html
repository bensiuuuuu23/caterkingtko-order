<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#b71c1c">
<title>иұӘйҡҚй»һеҝғе·ҘжҲҝ В· еӨ–иіЈиҗҪе–®</title>
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%;overflow:hidden;
    font-family:-apple-system,"PingFang TC","Heiti TC","Microsoft JhengHei",sans-serif;
    background:#f5f5f5;color:#222}
  .topbar{position:fixed;top:0;left:0;right:0;height:52px;z-index:30;
    background:#b71c1c;color:#fff;display:flex;align-items:center;justify-content:center;
    gap:8px;font-size:18px;font-weight:700;box-shadow:0 2px 6px rgba(0,0,0,.2)}
  .topbar small{font-weight:400;font-size:13px;opacity:.85}
  .layout{position:fixed;top:52px;bottom:64px;left:0;right:0;display:flex}
  /* е·ҰеҒҙеҲҶйЎһж¬„ */
  .cats{width:84px;flex:none;background:#ededed;overflow-y:auto;-webkit-overflow-scrolling:touch}
  .cat{padding:14px 6px;text-align:center;font-size:13px;line-height:1.3;color:#555;
    border-left:3px solid transparent;cursor:pointer}
  .cat.active{background:#fff;color:#b71c1c;font-weight:700;border-left-color:#b71c1c}
  /* еҸіеҒҙй»һеҝғеҲ—иЎЁ */
  .items{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:20px}
  .sec-h{position:sticky;top:0;background:#f5f5f5;padding:10px 12px 6px;
    font-size:14px;font-weight:700;color:#b71c1c;z-index:5}
  .card{display:flex;align-items:center;gap:10px;background:#fff;margin:0 10px 8px;
    padding:10px;border-radius:12px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
  .card img{width:74px;height:74px;flex:none;object-fit:cover;border-radius:10px;background:#eee}
  .card .nm{flex:1;font-size:15px;font-weight:600;line-height:1.35}
  /* ж•ёйҮҸеҠ жёӣ */
  .stp{display:flex;align-items:center;gap:8px;flex:none}
  .stp button{width:30px;height:30px;border-radius:50%;border:1.5px solid #b71c1c;
    background:#fff;color:#b71c1c;font-size:20px;line-height:1;font-weight:700;cursor:pointer;
    display:flex;align-items:center;justify-content:center;padding:0}
  .stp button.minus{opacity:0;pointer-events:none;transition:opacity .15s}
  .stp .qty{min-width:18px;text-align:center;font-size:16px;font-weight:700}
  .stp .qty.zero{display:none}
  .card.on{outline:2px solid #ffcdd2}
  /* еә•йғЁиіјзү©еҲ— */
  .cartbar{position:fixed;bottom:0;left:0;right:0;height:64px;z-index:30;
    background:#fff;box-shadow:0 -2px 8px rgba(0,0,0,.12);
    display:flex;align-items:center;padding:0 14px;gap:12px}
  .cartinfo{font-size:15px;color:#333;flex:1}
  .cartinfo b{color:#b71c1c;font-size:20px;margin:0 2px}
  .sendbtn{height:46px;padding:0 22px;border:none;border-radius:23px;font-size:16px;
    font-weight:700;color:#fff;background:#25D366;cursor:pointer;display:flex;
    align-items:center;gap:7px;white-space:nowrap}
  .sendbtn:disabled{background:#bdbdbd}
  .toast{position:fixed;left:50%;bottom:80px;transform:translateX(-50%);z-index:40;
    background:rgba(0,0,0,.82);color:#fff;padding:10px 16px;border-radius:20px;font-size:14px;
    opacity:0;transition:opacity .25s;pointer-events:none}
  .toast.show{opacity:1}
</style>
</head>
<body>
  <div class="topbar">рҹҘҹ иұӘйҡҚй»һеҝғе·ҘжҲҝ <small>еӨ–иіЈиҗҪе–®</small></div>
  <div class="layout">
    <nav class="cats" id="cats"></nav>
    <section class="items" id="items"></section>
  </div>
  <div class="cartbar">
    <div class="cartinfo">рҹӣ’ е·ІйҒё <b id="count">0</b> д»¶</div>
    <button class="sendbtn" id="sendbtn" disabled>
      <svg width="20" height="20" viewBox="0 0 24 24" fill="#fff"><path d="M12 2a10 10 0 0 0-8.6 15l-1.3 4.7 4.8-1.3A10 10 0 1 0 12 2zm5.8 14.2c-.2.7-1.4 1.3-2 1.4-.5.1-1.2.1-1.9-.1-.4-.1-1-.3-1.7-.6-3-1.3-4.9-4.3-5.1-4.5-.1-.2-1.2-1.5-1.2-2.9s.7-2 1-2.3c.2-.3.5-.3.7-.3h.5c.2 0 .4 0 .6.5l.8 2c.1.2.1.3 0 .5l-.4.5-.3.3c-.1.1-.3.3-.1.6.2.3.8 1.3 1.7 2.1 1.2 1 2.1 1.4 2.4 1.5.3.1.5.1.7-.1l.8-1c.2-.2.4-.2.6-.1l1.9.9c.3.1.5.2.5.4.1.2.1.9-.1 1.6z"/></svg>
      йҖҒеҮәиЁӮе–®
    </button>
  </div>
  <div class="toast" id="toast"></div>

<script>
const WA="85295747436";
const DATA={"cats": ["еҚіи’ёй»һеҝғ", "и…ёзІү", "йҰҷеҸЈз…ҺзӮёе°ҸйЈҹ", "еҢ…йЎһ", "и’ёйЈҜ", "зұіз·ҡ", "ж№Ҝе“Ғ", "еҒҘеә·и”¬иҸң", "з”ңе“Ғ"], "menu": [{"name": "еЁҘе§җдёҠзҙ йӨғ", "cat": "еҚіи’ёй»һеҝғ", "img": "img/item01.jpg"}, {"name": "еұұз«№зүӣиӮүзҗғ", "cat": "еҚіи’ёй»һеҝғ", "img": "img/item02.jpg"}, {"name": "дә”йҰҷйҮ‘йҢўиӮҡ", "cat": "еҚіи’ёй»һеҝғ", "img": "img/item03.jpg"}, {"name": "дә”йҰҷй№№ж°ҙи§’", "cat": "еҚіи’ёй»һеҝғ", "img": "img/item04.jpg"}, {"name": "жқһеӯҗжҝғж№Ҝй®®з«№еҚ·", "cat": "еҚіи’ёй»һеҝғ", "img": "img/item05.jpg"}, {"name": "жөҒжІҷеҘ¶зҡҮеҢ…", "cat": "еҚіи’ёй»һеҝғ", "img": "img/item06.jpg"}, {"name": "иҚ·и‘үзҸҚзҸ йӣһ", "cat": "еҚіи’ёй»һеҝғ", "img": "img/item07.jpg"}, {"name": "иұүжұҒи’ёжҺ’йӘЁ", "cat": "еҚіи’ёй»һеҝғ", "img": "img/item08.jpg"}, {"name": "иұүжұҒи’ёйіізҲӘ", "cat": "еҚіи’ёй»һеҝғ", "img": "img/item09.jpg"}, {"name": "иңңжұҒеҸүзҮ’еҢ…", "cat": "еҚіи’ёй»һеҝғ", "img": "img/item10.jpg"}, {"name": "жҪ®е·һи’ёзІүжһң", "cat": "еҚіи’ёй»һеҝғ", "img": "img/item11.jpg"}, {"name": "иқҰд»ҒзҮ’иіЈзҺӢ", "cat": "еҚіи’ёй»һеҝғ", "img": "img/item12.jpg"}, {"name": "иқҰйӨғжӢјзІүжһң", "cat": "еҚіи’ёй»һеҝғ", "img": "img/item13.jpg"}, {"name": "йӨҠйЎҸзҙ…жЈ—зі•", "cat": "еҚіи’ёй»һеҝғ", "img": "img/item14.jpg"}, {"name": "й®‘йӯҡеҶ¬иҸҮжЈүиҠұйӣһ", "cat": "еҚіи’ёй»һеҝғ", "img": "img/item15.jpg"}, {"name": "йҫҚд»”йҰ¬жӢүзі•", "cat": "еҚіи’ёй»һеҝғ", "img": "img/item16.jpg"}, {"name": "й®®иқҰиҸңиӢ—йӨғ", "cat": "еҚіи’ёй»һеҝғ", "img": "img/item17.jpg"}, {"name": "й»һеҝғжӢјзӣӨ", "cat": "еҚіи’ёй»һеҝғ", "img": "img/item18.jpg"}, {"name": "и ”зҡҮиқҰйӨғзҡҮ", "cat": "еҚіи’ёй»һеҝғ", "img": "img/item19.jpg"}, {"name": "йҰҷиҢңзүӣиӮүи…ё", "cat": "и…ёзІү", "img": "img/item20.jpg"}, {"name": "зҲҪеҸЈж»‘иқҰи…ё", "cat": "и…ёзІү", "img": "img/item21.jpg"}, {"name": "иңңжұҒеҸүзҮ’и…ё", "cat": "и…ёзІү", "img": "img/item22.jpg"}, {"name": "з”ҹз…Һиҳҝи””зі•", "cat": "йҰҷеҸЈз…ҺзӮёе°ҸйЈҹ", "img": "img/item23.jpg"}, {"name": "еӯңз„¶зӮёйӣһзҝј", "cat": "йҰҷеҸЈз…ҺзӮёе°ҸйЈҹ", "img": "img/item24.jpg"}, {"name": "жІҷеҫӢйӣңжһңй®®иқҰзӮёйӣІеҗһ", "cat": "йҰҷеҸЈз…ҺзӮёе°ҸйЈҹ", "img": "img/item25.jpg"}, {"name": "и’ңи“үиҠқеЈ«й®®иқҰй•·жҳҘеҚ·", "cat": "йҰҷеҸЈз…ҺзӮёе°ҸйЈҹ", "img": "img/item26.jpg"}, {"name": "и’ңи“үзӮёйӣһзҝј", "cat": "йҰҷеҸЈз…ҺзӮёе°ҸйЈҹ", "img": "img/item27.jpg"}, {"name": "и“®и—•з…ҺйҜӘйӯҡйӨ…", "cat": "йҰҷеҸЈз…ҺзӮёе°ҸйЈҹ", "img": "img/item28.jpg"}, {"name": "й®®иқҰи…җзҡ®еҚ·", "cat": "йҰҷеҸЈз…ҺзӮёе°ҸйЈҹ", "img": "img/item29.jpg"}, {"name": "з”ҹз…ҺиҸңиӮүеҢ…", "cat": "еҢ…йЎһ", "img": "img/item30.jpg"}, {"name": "еўЁиҘҝе“ҘеҸүзҮ’еҢ…", "cat": "еҢ…йЎһ", "img": "img/item31.jpg"}, {"name": "жҷӮд»Өй®®е§‘з« йӯҡйӣһзІ’йЈҜ", "cat": "и’ёйЈҜ", "img": "img/item32.jpg"}, {"name": "жў…иҸңиӮүйӨ…йЈҜ", "cat": "и’ёйЈҜ", "img": "img/item33.jpg"}, {"name": "жә«жіүиӣӢзүӣиӮүйЈҜ", "cat": "и’ёйЈҜ", "img": "img/item34.jpg"}, {"name": "йіізҲӘжҺ’йӘЁйЈҜ", "cat": "и’ёйЈҜ", "img": "img/item35.jpg"}, {"name": "йҮ‘ж№Ҝй…ёиҸңйӯҡзүҮж№Ҝзұіз·ҡ", "cat": "зұіз·ҡ", "img": "img/item36.jpg"}, {"name": "йҮ‘иҸҮиӮҘзүӣж№Ҝзұіз·ҡ", "cat": "зұіз·ҡ", "img": "img/item37.jpg"}, {"name": "еҺҡеҶ¬иҸҮж№Ҝзұіз·ҡ", "cat": "зұіз·ҡ", "img": "img/item38.jpg"}, {"name": "зҮ’жҺ’йӘЁж№Ҝзұіз·ҡ", "cat": "зұіз·ҡ", "img": "img/item39.jpg"}, {"name": "йӣһдёӯзҝјж№Ҝзұіз·ҡ", "cat": "зұіз·ҡ", "img": "img/item40.jpg"}, {"name": "и¶іж–ҷеҺҹзӣ…зҮүж№Ҝ", "cat": "ж№Ҝе“Ғ", "img": "img/item41.jpg"}, {"name": "жүӢжӢҚйқ’з“ң", "cat": "еҒҘеә·и”¬иҸң", "img": "img/item42.jpg"}, {"name": "иұүжІ№ж–°й®®жҷӮиҸң", "cat": "еҒҘеә·и”¬иҸң", "img": "img/item43.jpg"}, {"name": "иҠ’жһңеёғз”ё", "cat": "з”ңе“Ғ", "img": "img/item44.jpg"}, {"name": "жҮ·иҲҠдёғеҪ©е•«е–ұ", "cat": "з”ңе“Ғ", "img": "img/item45.jpg"}]};
const cart={};                       // name -> qty
const catsEl=document.getElementById('cats');
const itemsEl=document.getElementById('items');
const countEl=document.getElementById('count');
const sendBtn=document.getElementById('sendbtn');
const toastEl=document.getElementById('toast');

// е»әе·ҰеҒҙеҲҶйЎһ
DATA.cats.forEach((c,i)=>{
  const d=document.createElement('div');
  d.className='cat'+(i===0?' active':'');
  d.textContent=c; d.dataset.cat=c;
  d.onclick=()=>{const s=document.getElementById('sec-'+i);
    itemsEl.scrollTo({top:s.offsetTop-4,behavior:'smooth'});};
  catsEl.appendChild(d);
});

// е»әеҸіеҒҙй»һеҝғ
DATA.cats.forEach((c,i)=>{
  const h=document.createElement('div');
  h.className='sec-h'; h.id='sec-'+i; h.textContent=c;
  itemsEl.appendChild(h);
  DATA.menu.filter(m=>m.cat===c).forEach(m=>{
    const card=document.createElement('div'); card.className='card';
    card.innerHTML=
      '<img loading="lazy" src="'+m.img+'" alt="">'+
      '<div class="nm">'+m.name+'</div>'+
      '<div class="stp">'+
        '<button class="minus" aria-label="жёӣ">вҲ’</button>'+
        '<span class="qty zero">0</span>'+
        '<button class="plus" aria-label="еҠ ">+</button>'+
      '</div>';
    const minus=card.querySelector('.minus');
    const plus=card.querySelector('.plus');
    const qty=card.querySelector('.qty');
    function render(){
      const n=cart[m.name]||0;
      qty.textContent=n;
      qty.classList.toggle('zero',n===0);
      minus.style.opacity=n>0?'1':'0';
      minus.style.pointerEvents=n>0?'auto':'none';
      card.classList.toggle('on',n>0);
      updateCart();
    }
    plus.onclick=()=>{cart[m.name]=(cart[m.name]||0)+1;render();};
    minus.onclick=()=>{cart[m.name]=Math.max(0,(cart[m.name]||0)-1);if(!cart[m.name])delete cart[m.name];render();};
    itemsEl.appendChild(card);
  });
});

// жҚІеӢ•жҷӮй«ҳдә®е°ҚжҮүеҲҶйЎһ
const secs=DATA.cats.map((c,i)=>document.getElementById('sec-'+i));
itemsEl.addEventListener('scroll',()=>{
  let active=0;
  secs.forEach((s,i)=>{ if(s.offsetTop-12<=itemsEl.scrollTop) active=i; });
  [...catsEl.children].forEach((el,i)=>el.classList.toggle('active',i===active));
});

function updateCart(){
  let total=0; for(const k in cart) total+=cart[k];
  countEl.textContent=total;
  sendBtn.disabled=total===0;
}

function buildMsg(){
  let lines=["рҹҘҹ иұӘйҡҚй»һеҝғе·ҘжҲҝ еӨ–иіЈиЁӮе–®","в”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғ"];
  let total=0;
  DATA.cats.forEach(c=>{
    const got=DATA.menu.filter(m=>m.cat===c && cart[m.name]>0);
    if(got.length){
      lines.push("гҖҗ"+c+"гҖ‘");
      got.forEach(m=>{lines.push("гғ»"+m.name+" Г—"+cart[m.name]); total+=cart[m.name];});
    }
  });
  lines.push("в”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғ","еҗҲиЁҲ "+total+" д»¶");
  return lines.join("\n");
}

function toast(t){toastEl.textContent=t;toastEl.classList.add('show');
  setTimeout(()=>toastEl.classList.remove('show'),1800);}

sendBtn.onclick=()=>{
  let total=0; for(const k in cart) total+=cart[k];
  if(!total){toast("и«Ӣе…ҲйҒёж“Үй»һеҝғж•ёйҮҸ");return;}
  const url="https://wa.me/"+WA+"?text="+encodeURIComponent(buildMsg());
  window.location.href=url;
};
</script>
</body>
</html>
